---
# Cert issuer
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: harbor-demo
spec:
  ca:
    secretName: iam-demo-ca
---
# Certificates of ingress
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-demo-certificate
  namespace: harbor-demo
spec:
  secretName: harbor-certificate
  dnsNames:
    - core.harbor.iam-demo.test
    - notary.harbor.iam-demo.test
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
